<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoomieMatch Search</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Room Seeker Experience</p>
        <h1>Find a room close to your campus</h1>
        <p class="subtitle">
          Search nearby listings by campus and keywords to keep your commute short.
        </p>

        <form id="search-form" class="search-card">
          <label class="field">
            <span>Campus</span>
            <select id="campus-filter" name="campus">
              <option value="">All campuses</option>
            </select>
          </label>

          <label class="field field-grow">
            <span>Keywords</span>
            <div class="autocomplete-wrapper">
              <input id="query-input" name="query" type="text" placeholder="e.g. private room, shared, studio" autocomplete="off" />
              <div id="autocomplete" class="autocomplete-list" hidden></div>
            </div>
          </label>

          <button type="submit">Search</button>
        </form>
      </section>

      <section class="results-panel">
        <div class="results-header">
          <h2>Available rooms</h2>
          <p id="results-summary">Loading listings...</p>
        </div>
        <div id="results-list" class="results-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
